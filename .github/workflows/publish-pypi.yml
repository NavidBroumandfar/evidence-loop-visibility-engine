name: publish-pypi

on:
  release:
    types: [published]

permissions:
  contents: read
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'
      - name: Verify release identity and main lineage
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          python scripts/verify_release.py --tag "$RELEASE_TAG"
          test "$(git rev-parse "${RELEASE_TAG}^{commit}")" = "$GITHUB_SHA"
          git fetch --no-tags origin main
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main
      - name: Require successful public checks for the tagged commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          test "$(gh api \
            "repos/${GITHUB_REPOSITORY}/actions/workflows/ci.yml/runs?head_sha=${GITHUB_SHA}&status=success&per_page=1" \
            --jq '.total_count')" -ge 1
      - run: python -m pip install -e '.[release]'
      - run: make check
      - run: python scripts/artifact_smoke.py --dist-dir dist --digest-manifest artifact-digests.sha256
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: python-package-distributions
          path: |
            dist/
            artifact-digests.sha256
          if-no-files-found: error
          retention-days: 7

  verify:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: python-package-distributions
          path: release/
      - name: Verify artifact digests
        run: python scripts/artifact_manifest.py --root release --manifest release/artifact-digests.sha256

  publish:
    needs: [build, verify]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/evidence-loop-visibility-engine/
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: python-package-distributions
          path: release/
      - uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247 # release/v1
        with:
          packages-dir: release/dist/
