name: public-checks

on:
  push:
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install -e .
      - run: python -m unittest discover -s tests -v
      - run: python -m compileall -q src tests scripts
      - run: python scripts/validate_public_release.py
      - run: python -m evidence_loop demo --output work/ci-demo
      - run: python -m evidence_loop benchmark
  artifacts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'
      - run: python -m pip install -e '.[release]'
      - run: python scripts/artifact_smoke.py
  companion-action:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Prepare synthetic reserved-domain envelopes
        shell: bash
        run: |
          mkdir -p work/action-envelopes
          cp examples/connector-envelope.json work/action-envelopes/first.json
          cp examples/connector-envelope-second.json work/action-envelopes/second.json
      - name: Run the local companion Action
        id: evidence-loop
        uses: ./
        with:
          envelope-directory: work/action-envelopes
          as-of: 2026-12-31T00:00:00Z
          output-directory: work/action-output
      - name: Require the truthful envelope-only state
        shell: bash
        env:
          TERMINAL_STATE: ${{ steps.evidence-loop.outputs.terminal-state }}
          EXTERNAL_CALLS: ${{ steps.evidence-loop.outputs.external-calls }}
        run: |
          test "$TERMINAL_STATE" = "clean-no-op"
          test "$EXTERNAL_CALLS" = "0"
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@dcedce43c6f43de0b836d1fe38946645c9c638dc # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
